<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('알림')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar(${menus}, '/approval/notifications')}"></div>
<div th:replace="~{fragments/layout :: topbar('알림', ${currentUser})}"></div>
<main id="main">
  <div class="page-title mb-3"><i class="bi bi-bell me-2 text-primary"></i>알림</div>

  <div class="card" style="max-width:760px;">
    <div class="card-body p-0">
      <div th:each="n : ${notifications}"
           class="d-flex align-items-start gap-3 px-4 py-3 border-bottom"
           th:classappend="${n.read} ? 'bg-light' : ''">
        <i class="bi bi-bell-fill text-primary mt-1"></i>
        <div class="flex-grow-1">
          <div th:text="${n.message}" class="small">메시지</div>
          <div class="text-muted" style="font-size:.75rem;"
               th:text="${n.createdAt != null ? #temporals.format(n.createdAt,'yyyy-MM-dd HH:mm') : '-'}">-</div>
        </div>
        <a th:if="${n.documentId != null}"
           th:href="@{/approval/{id}(id=${n.documentId})}"
           class="btn btn-sm btn-outline-primary">보기</a>
      </div>
      <div th:if="${notifications == null or notifications.isEmpty()}"
           class="text-center text-muted py-5">
        <i class="bi bi-bell-slash fs-2 d-block mb-2"></i>알림이 없습니다.
      </div>
    </div>
  </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
