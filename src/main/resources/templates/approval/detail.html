<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('문서 상세')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar(${menus}, '/approval/drafts')}"></div>
<div th:replace="~{fragments/layout :: topbar('문서 상세', ${currentUser})}"></div>
<main id="main">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="page-title mb-0"><i class="bi bi-file-earmark-check me-2 text-primary"></i>결재 문서</div>
    <a th:href="@{/approval/drafts}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>목록
    </a>
  </div>

  <div class="row g-3">
    <!-- 문서 내용 -->
    <div class="col-lg-8">
      <div class="card mb-3">
        <div class="card-header py-3 px-4 d-flex align-items-center justify-content-between">
          <div>
            <span th:switch="${document.documentType}">
              <span th:case="'GENERAL'"  class="badge bg-secondary me-2">일반기안</span>
              <span th:case="'LEAVE'"    class="badge bg-info me-2">휴가신청</span>
              <span th:case="'EXPENSE'"  class="badge bg-warning text-dark me-2">경비지출</span>
              <span th:case="'PURCHASE'" class="badge bg-primary me-2">구매요청</span>
              <span th:case="'REPORT'"   class="badge bg-dark me-2">보고서</span>
            </span>
            <span class="fw-bold fs-5" th:text="${document.title}">제목</span>
          </div>
          <span th:switch="${document.status}">
            <span th:case="'IN_PROGRESS'" class="badge bg-primary fs-6">결재중</span>
            <span th:case="'APPROVED'"    class="badge bg-success fs-6">승인완료</span>
            <span th:case="'REJECTED'"    class="badge bg-danger fs-6">반려</span>
            <span th:case="'CANCELLED'"   class="badge bg-secondary fs-6">취소</span>
          </span>
        </div>
        <div class="card-body px-4 py-3">
          <div class="text-muted small mb-3">
            <i class="bi bi-clock me-1"></i>
            <span th:text="${document.createdAt != null ? #temporals.format(document.createdAt,'yyyy-MM-dd HH:mm') : '-'}">-</span>
          </div>
          <div style="min-height:200px; white-space:pre-wrap; line-height:1.8;" th:text="${document.content}">내용</div>
        </div>
      </div>
    </div>

    <!-- 결재선 -->
    <div class="col-lg-4">
      <div class="card">
        <div class="card-header py-3 px-4 fw-semibold">
          <i class="bi bi-diagram-2 me-1"></i>결재선
        </div>
        <div class="card-body p-3">
          <div th:each="line : ${lines}" class="mb-3">
            <div class="d-flex align-items-start gap-3 p-3 rounded border"
                 th:classappend="${line.status == 'APPROVED'} ? 'border-success bg-success bg-opacity-10' :
                                  (${line.status == 'REJECTED'} ? 'border-danger bg-danger bg-opacity-10' : '')">
              <div class="text-center">
                <span class="badge bg-primary rounded-pill mb-1" th:text="${line.stepOrder}">1</span>
                <div>
                  <span th:switch="${line.status}">
                    <i th:case="'APPROVED'" class="bi bi-check-circle-fill text-success fs-5"></i>
                    <i th:case="'REJECTED'" class="bi bi-x-circle-fill text-danger fs-5"></i>
                    <i th:case="*"          class="bi bi-clock-history text-warning fs-5"></i>
                  </span>
                </div>
              </div>
              <div class="flex-grow-1">
                <div class="fw-semibold small">
                  <span th:each="u : ${users}" th:if="${u.id == line.approverId}" th:text="${u.name}">결재자</span>
                </div>
                <div class="text-muted small" th:text="${line.status == 'WAITING' ? '대기중' :
                  (line.status == 'APPROVED' ? '승인' : '반려')}">상태</div>
                <div th:if="${line.comment}" class="small text-muted mt-1 fst-italic"
                     th:text="'의견: ' + ${line.comment}">의견</div>
                <div th:if="${line.approvedAt}" class="small text-muted"
                     th:text="${#temporals.format(line.approvedAt,'yyyy-MM-dd HH:mm')}">-</div>

                <!-- 내가 결재해야 하는 라인 -->
                <div th:if="${line.status == 'WAITING' and line.approverId == currentUser.userId}"
                     class="mt-2">
                  <form th:action="@{/approval/lines/{id}/approve(id=${line.id})}" method="post">
                    <textarea name="comment" class="form-control form-control-sm mb-2"
                              rows="2" placeholder="승인 의견 (선택)"></textarea>
                    <button type="submit" class="btn btn-success btn-sm w-100 mb-1">
                      <i class="bi bi-check-lg me-1"></i>승인
                    </button>
                  </form>
                  <form th:action="@{/approval/lines/{id}/reject(id=${line.id})}" method="post">
                    <textarea name="comment" class="form-control form-control-sm mb-2"
                              rows="2" placeholder="반려 사유"></textarea>
                    <button type="submit" class="btn btn-danger btn-sm w-100"
                            onclick="return confirm('반려하시겠습니까?')">
                      <i class="bi bi-x-lg me-1"></i>반려
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>

          <div th:if="${lines == null or lines.isEmpty()}" class="text-center text-muted py-3 small">
            <i class="bi bi-person-x d-block mb-1"></i>결재선이 없습니다.
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
