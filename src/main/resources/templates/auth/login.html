<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 | Taco ERP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body {
      background: linear-gradient(135deg, #1e2a38 0%, #2d3f52 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      width: 100%; max-width: 420px;
      background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      padding: 2.5rem;
    }
    .brand-logo { font-size: 2rem; color: #0d6efd; }
    .brand-title { font-size: 1.5rem; font-weight: 700; color: #1e2a38; }
    .brand-sub { color: #6c757d; font-size: .875rem; }
    .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 .2rem rgba(13,110,253,.15); }
    .btn-login { background: #0d6efd; border: none; height: 48px; font-size: 1rem; font-weight: 600; border-radius: 10px; }
    .btn-login:hover { background: #0b5ed7; }
    .input-group-text { background: #f8f9fa; border-right: none; }
    .form-control { border-left: none; }
    .form-control:first-child { border-left: 1px solid #dee2e6; border-right: none; }
    .alert-login { border-radius: 10px; font-size: .875rem; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <div class="brand-logo mb-2"><i class="bi bi-grid-3x3-gap-fill"></i></div>
    <div class="brand-title">Taco ERP</div>
    <div class="brand-sub">Enterprise Resource Planning System</div>
  </div>

  <div th:if="${param.error}" class="alert alert-danger alert-login" role="alert">
    <i class="bi bi-exclamation-circle me-1"></i>
    아이디 또는 비밀번호가 올바르지 않습니다.
  </div>
  <div th:if="${param.logout}" class="alert alert-success alert-login" role="alert">
    <i class="bi bi-check-circle me-1"></i>
    로그아웃 되었습니다.
  </div>

  <form th:action="@{/login}" method="post">
    <div class="mb-3">
      <label class="form-label fw-semibold small">아이디</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
        <input type="text" name="username" class="form-control" placeholder="아이디를 입력하세요" required autofocus/>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold small">비밀번호</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
        <input type="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required/>
      </div>
    </div>
    <button type="submit" class="btn btn-login btn-primary w-100 text-white">
      <i class="bi bi-box-arrow-in-right me-1"></i> 로그인
    </button>
  </form>

  <div class="text-center mt-4 text-muted" style="font-size:.75rem;">
    <i class="bi bi-shield-lock me-1"></i> 권한이 없는 접근은 감사 로그에 기록됩니다.
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
