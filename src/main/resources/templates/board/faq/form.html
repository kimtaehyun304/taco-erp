<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('FAQ 작성')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar(${menus}, '/board/faq')}"></div>
<div th:replace="~{fragments/layout :: topbar('FAQ 작성', ${currentUser})}"></div>

<main id="main">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="page-title mb-0">
      <i class="bi bi-question-circle me-2 text-primary"></i>
      <span th:text="${board.id != null} ? 'FAQ 수정' : 'FAQ 등록'">FAQ 등록</span>
    </div>
    <a th:href="@{/board/faq}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i> 목록
    </a>
  </div>

  <div class="card">
    <div class="card-body p-4">
      <form th:action="${board.id != null} ? @{/board/faq/{id}(id=${board.id})} : @{/board/faq}"
            method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">질문 <span class="text-danger">*</span></label>
          <input type="text" name="title" class="form-control"
                 th:value="${board.title}" required placeholder="자주 묻는 질문을 입력하세요"/>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">답변</label>
          <textarea name="content" class="form-control" rows="10"
                    placeholder="답변 내용을 입력하세요" th:text="${board.content}"></textarea>
        </div>
        <div class="d-flex gap-2 justify-content-end">
          <a th:href="@{/board/faq}" class="btn btn-outline-secondary">취소</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>
            <span th:text="${board.id != null} ? '수정 완료' : '등록 완료'">저장</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
