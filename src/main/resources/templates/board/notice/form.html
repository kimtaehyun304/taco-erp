<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('공지사항 작성')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar(${menus}, '/board/notice')}"></div>
<div th:replace="~{fragments/layout :: topbar('공지사항 작성', ${currentUser})}"></div>

<main id="main">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="page-title mb-0">
      <i class="bi bi-megaphone me-2 text-primary"></i>
      <span th:text="${board.id != null} ? '공지사항 수정' : '공지사항 작성'">공지사항 작성</span>
    </div>
    <a th:href="@{/board/notice}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i> 목록
    </a>
  </div>

  <div class="card">
    <div class="card-body p-4">
      <form th:action="${board.id != null} ? @{/board/notice/{id}(id=${board.id})} : @{/board/notice}"
            method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">제목 <span class="text-danger">*</span></label>
          <input type="text" name="title" class="form-control"
                 th:value="${board.title}" required placeholder="제목을 입력하세요"/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">내용</label>
          <textarea name="content" class="form-control" rows="12"
                    placeholder="내용을 입력하세요" th:text="${board.content}"></textarea>
        </div>
        <div class="mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="pinned" value="true"
                   id="pinned" th:checked="${board.pinned}"/>
            <label class="form-check-label" for="pinned">
              <i class="bi bi-pin-fill text-danger me-1"></i> 상단 고정 (공지)
            </label>
          </div>
          <div class="form-text">상단 고정은 공지사항당 최대 5개까지 가능합니다. 초과 시 저장이 거부됩니다.</div>
        </div>
        <div class="d-flex gap-2 justify-content-end">
          <a th:href="@{/board/notice}" class="btn btn-outline-secondary">취소</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>
            <span th:text="${board.id != null} ? '수정 완료' : '등록 완료'">저장</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
