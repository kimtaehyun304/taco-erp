<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('공지사항')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar(${menus}, '/board/notice')}"></div>
<div th:replace="~{fragments/layout :: topbar('공지사항', ${currentUser})}"></div>

<main id="main">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="page-title mb-0"><i class="bi bi-megaphone me-2 text-primary"></i>공지사항</div>
    <a th:if="${canWriteNotice}" th:href="@{/board/notice/new}" class="btn btn-primary">
      <i class="bi bi-pencil-square me-1"></i> 글쓰기
    </a>
  </div>

  <!-- 검색 -->
  <div class="card mb-3">
    <div class="card-body py-3 px-4">
      <form th:action="@{/board/notice}" method="get" class="d-flex gap-2">
        <div class="input-group" style="max-width:360px;">
          <span class="input-group-text"><i class="bi bi-search text-muted"></i></span>
          <input type="text" name="keyword" class="form-control" th:value="${keyword}" placeholder="제목 검색"/>
        </div>
        <button type="submit" class="btn btn-primary">검색</button>
        <a th:href="@{/board/notice}" class="btn btn-outline-secondary">초기화</a>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th class="px-4" style="width:80px;">번호</th>
              <th>제목</th>
              <th style="width:120px;">작성자</th>
              <th style="width:120px;">작성일</th>
              <th style="width:80px;" class="text-center">조회</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="b : ${boards}">
              <td class="px-4 text-muted small">
                <i th:if="${b.pinned}" class="bi bi-pin-fill text-danger me-1"></i>
                <span th:unless="${b.pinned}" th:text="${b.id}">-</span>
              </td>
              <td>
                <a th:href="@{/board/notice/{id}(id=${b.id})}" class="text-decoration-none text-dark fw-semibold"
                   th:text="${b.title}">제목</a>
                <span th:if="${b.pinned}" class="badge bg-danger ms-1 small">공지</span>
              </td>
              <td class="small text-muted" th:text="${authorNames.get(b.authorId)} ?: '알 수 없음'">-</td>
              <td class="small text-muted"
                  th:text="${b.createdAt != null ? #temporals.format(b.createdAt,'yyyy-MM-dd') : '-'}">-</td>
              <td class="text-center small text-muted" th:text="${b.viewCount}">0</td>
            </tr>
            <tr th:if="${boards == null or boards.isEmpty()}">
              <td colspan="5" class="text-center text-muted py-5">
                <i class="bi bi-megaphone fs-2 d-block mb-2"></i>등록된 공지사항이 없습니다.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
