<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('사용자 등록/수정')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar(${menus}, '/admin/users')}"></div>
<div th:replace="~{fragments/layout :: topbar('사용자 등록/수정', ${currentUser})}"></div>

<main id="main">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="page-title mb-0">
      <i class="bi bi-person-plus me-2 text-primary"></i>
      <span th:text="${user.id != null} ? '사용자 수정' : '사용자 등록'">사용자 등록</span>
    </div>
    <a th:href="@{/admin/users}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i> 목록
    </a>
  </div>

  <div class="card">
    <div class="card-body p-4">
      <form th:action="${user.id != null} ? @{/admin/users/{id}(id=${user.id})} : @{/admin/users}"
            method="post">

        <div class="row g-3">
          <!-- 아이디 -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">아이디 <span class="text-danger">*</span></label>
            <input type="text" name="username" class="form-control"
                   th:value="${user.username}"
                   th:readonly="${user.id != null}" required/>
          </div>
          <!-- 비밀번호 -->
          <div class="col-md-6" th:if="${user.id == null}">
            <label class="form-label fw-semibold">비밀번호 <span class="text-danger">*</span></label>
            <input type="password" name="password" class="form-control"
                   placeholder="비밀번호 입력" required/>
          </div>
          <!-- 이름 -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">이름 <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control"
                   th:value="${user.name}" required/>
          </div>
          <!-- 이메일 -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">이메일</label>
            <input type="email" name="email" class="form-control"
                   th:value="${user.email}"/>
          </div>
          <!-- 전화번호 -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">전화번호</label>
            <input type="text" name="phone" class="form-control"
                   th:value="${user.phone}" placeholder="010-0000-0000"/>
          </div>
          <!-- 부서 -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">부서</label>
            <select name="departmentId" class="form-select">
              <option value="">-- 부서 선택 --</option>
              <option th:each="dept : ${departments}"
                      th:value="${dept.id}"
                      th:text="${dept.name}"
                      th:selected="${dept.id == user.departmentId}">부서</option>
            </select>
          </div>
          <!-- 직급 -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">직급</label>
            <select name="positionId" class="form-select">
              <option value="">-- 직급 선택 --</option>
              <option th:each="pos : ${positions}"
                      th:value="${pos.id}"
                      th:text="${pos.name}"
                      th:selected="${pos.id == user.positionId}">직급</option>
            </select>
          </div>
          <!-- 역할 -->
          <div class="col-12">
            <label class="form-label fw-semibold">역할 (Role)</label>
            <div class="d-flex flex-wrap gap-3 mt-1">
              <div class="form-check" th:each="role : ${roles}">
                <input class="form-check-input" type="checkbox"
                       name="roleIds" th:value="${role.id}"
                       th:id="'role-' + ${role.id}"
                       th:checked="${userRoles != null and #lists.contains(userRoles, role.name)}"/>
                <label class="form-check-label" th:for="'role-' + ${role.id}"
                       th:text="${role.name} + ' (' + ${role.description} + ')'">역할</label>
              </div>
            </div>
          </div>
        </div>

        <hr class="my-4"/>
        <div class="d-flex gap-2 justify-content-end">
          <a th:href="@{/admin/users}" class="btn btn-outline-secondary">취소</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>
            <span th:text="${user.id != null} ? '수정 완료' : '등록 완료'">저장</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
