<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('역할 등록/수정')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar(${menus}, '/admin/roles')}"></div>
<div th:replace="~{fragments/layout :: topbar('역할 등록/수정', ${currentUser})}"></div>

<main id="main">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="page-title mb-0">
      <i class="bi bi-shield me-2 text-primary"></i>
      <span th:text="${role.id != null} ? '역할 수정' : '역할 등록'">역할 등록</span>
    </div>
    <a th:href="@{/admin/roles}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i> 목록
    </a>
  </div>

  <div class="card" style="max-width:520px;">
    <div class="card-body p-4">
      <form th:action="${role.id != null} ? @{/admin/roles/{id}(id=${role.id})} : @{/admin/roles}"
            method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">역할 코드 <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control font-monospace"
                 th:value="${role.name}" required
                 placeholder="ROLE_ADMIN"
                 pattern="ROLE_[A-Z_]+"
                 title="ROLE_ 접두사로 시작하는 대문자 코드"/>
          <div class="form-text">반드시 <code>ROLE_</code> 로 시작해야 합니다. (예: ROLE_ADMIN, ROLE_HR)</div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">설명</label>
          <input type="text" name="description" class="form-control"
                 th:value="${role.description}" placeholder="역할에 대한 간략한 설명"/>
        </div>
        <div class="d-flex gap-2 justify-content-end">
          <a th:href="@{/admin/roles}" class="btn btn-outline-secondary">취소</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>
            <span th:text="${role.id != null} ? '수정 완료' : '등록 완료'">저장</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
