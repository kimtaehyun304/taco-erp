<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('역할 관리')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar(${menus}, '/admin/roles')}"></div>
<div th:replace="~{fragments/layout :: topbar('역할 관리', ${currentUser})}"></div>

<main id="main">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="page-title mb-0"><i class="bi bi-shield me-2 text-primary"></i>역할(Role) 관리</div>
    <a th:href="@{/admin/roles/new}" class="btn btn-primary">
      <i class="bi bi-plus-lg me-1"></i> 역할 추가
    </a>
  </div>

  <div class="card" style="max-width:760px;">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th class="px-4">ID</th>
              <th>역할 코드</th>
              <th>설명</th>
              <th>등록일</th>
              <th class="text-center">관리</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="role : ${roles}">
              <td class="px-4 text-muted small" th:text="${role.id}">-</td>
              <td>
                <span class="badge bg-dark font-monospace" th:text="${role.name}">-</span>
              </td>
              <td class="text-muted" th:text="${role.description}">-</td>
              <td class="text-muted small"
                  th:text="${role.createdAt != null ? #temporals.format(role.createdAt,'yyyy-MM-dd') : '-'}">-</td>
              <td class="text-center">
                <a th:href="@{/admin/roles/{id}/edit(id=${role.id})}" class="btn btn-sm btn-outline-primary me-1">
                  <i class="bi bi-pencil"></i>
                </a>
                <form th:action="@{/admin/roles/{id}/delete(id=${role.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('정말 삭제하시겠습니까?')">
                  <button type="submit" class="btn btn-sm btn-outline-danger">
                    <i class="bi bi-trash"></i>
                  </button>
                </form>
              </td>
            </tr>
            <tr th:if="${roles == null or roles.isEmpty()}">
              <td colspan="5" class="text-center text-muted py-4">등록된 역할이 없습니다.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="alert alert-info mt-3" style="max-width:760px;">
    <i class="bi bi-info-circle me-1"></i>
    Spring Security 연동을 위해 역할 코드는 반드시 <strong>ROLE_</strong> 접두사로 시작해야 합니다.
    (예: ROLE_ADMIN, ROLE_USER)
  </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
