<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('부서 등록/수정')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar(${menus}, '/admin/departments')}"></div>
<div th:replace="~{fragments/layout :: topbar('부서 등록/수정', ${currentUser})}"></div>

<main id="main">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="page-title mb-0">
      <i class="bi bi-diagram-3 me-2 text-primary"></i>
      <span th:text="${dept.id != null} ? '부서 수정' : '부서 등록'">부서 등록</span>
    </div>
    <a th:href="@{/admin/departments}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i> 목록
    </a>
  </div>

  <div class="card" style="max-width:560px;">
    <div class="card-body p-4">
      <form th:action="${dept.id != null} ? @{/admin/departments/{id}(id=${dept.id})} : @{/admin/departments}"
            method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">부서명 <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control"
                 th:value="${dept.name}" required placeholder="예) 개발팀"/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">상위 부서</label>
          <select name="parentId" class="form-select">
            <option value="">-- 최상위 부서 --</option>
            <option th:each="d : ${departments}"
                    th:if="${dept.id == null or d.id != dept.id}"
                    th:value="${d.id}"
                    th:text="${d.name}"
                    th:selected="${d.id == dept.parentId}">부서</option>
          </select>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">정렬 순서</label>
          <input type="number" name="sortOrder" class="form-control"
                 th:value="${dept.sortOrder}" min="0" placeholder="0"/>
        </div>
        <div class="d-flex gap-2 justify-content-end">
          <a th:href="@{/admin/departments}" class="btn btn-outline-secondary">취소</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>
            <span th:text="${dept.id != null} ? '수정 완료' : '등록 완료'">저장</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
