<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('직급 관리')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar(${menus}, '/admin/positions')}"></div>
<div th:replace="~{fragments/layout :: topbar('직급 관리', ${currentUser})}"></div>

<main id="main">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="page-title mb-0"><i class="bi bi-award me-2 text-primary"></i>직급 관리</div>
    <a th:href="@{/admin/positions/new}" class="btn btn-primary">
      <i class="bi bi-plus-lg me-1"></i> 직급 추가
    </a>
  </div>

  <div class="card" style="max-width:680px;">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th class="px-4">ID</th>
              <th>직급명</th>
              <th>레벨</th>
              <th>등록일</th>
              <th class="text-center">관리</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="pos : ${positions}">
              <td class="px-4 text-muted small" th:text="${pos.id}">-</td>
              <td>
                <span class="fw-semibold" th:text="${pos.name}">-</span>
              </td>
              <td>
                <span class="badge bg-primary rounded-pill" th:text="'Lv.' + ${pos.level}">-</span>
              </td>
              <td class="text-muted small"
                  th:text="${pos.createdAt != null ? #temporals.format(pos.createdAt,'yyyy-MM-dd') : '-'}">-</td>
              <td class="text-center">
                <a th:href="@{/admin/positions/{id}/edit(id=${pos.id})}" class="btn btn-sm btn-outline-primary me-1">
                  <i class="bi bi-pencil"></i>
                </a>
                <form th:action="@{/admin/positions/{id}/delete(id=${pos.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('정말 삭제하시겠습니까?')">
                  <button type="submit" class="btn btn-sm btn-outline-danger">
                    <i class="bi bi-trash"></i>
                  </button>
                </form>
              </td>
            </tr>
            <tr th:if="${positions == null or positions.isEmpty()}">
              <td colspan="5" class="text-center text-muted py-4">등록된 직급이 없습니다.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
