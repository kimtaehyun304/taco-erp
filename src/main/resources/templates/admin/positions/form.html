<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('직급 등록/수정')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar(${menus}, '/admin/positions')}"></div>
<div th:replace="~{fragments/layout :: topbar('직급 등록/수정', ${currentUser})}"></div>

<main id="main">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="page-title mb-0">
      <i class="bi bi-award me-2 text-primary"></i>
      <span th:text="${position.id != null} ? '직급 수정' : '직급 등록'">직급 등록</span>
    </div>
    <a th:href="@{/admin/positions}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i> 목록
    </a>
  </div>

  <div class="card" style="max-width:480px;">
    <div class="card-body p-4">
      <form th:action="${position.id != null} ? @{/admin/positions/{id}(id=${position.id})} : @{/admin/positions}"
            method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">직급명 <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control"
                 th:value="${position.name}" required placeholder="예) 과장"/>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">레벨 <span class="text-danger">*</span></label>
          <input type="number" name="level" class="form-control"
                 th:value="${position.level}" min="1" max="99" required
                 placeholder="숫자가 높을수록 상위 직급"/>
          <div class="form-text">숫자가 클수록 상위 직급입니다. (예: 사원=1, 부장=5)</div>
        </div>
        <div class="d-flex gap-2 justify-content-end">
          <a th:href="@{/admin/positions}" class="btn btn-outline-secondary">취소</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>
            <span th:text="${position.id != null} ? '수정 완료' : '등록 완료'">저장</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
