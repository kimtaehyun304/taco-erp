<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('대시보드')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar(${menus}, '/dashboard')}"></div>
<div th:replace="~{fragments/layout :: topbar('대시보드', ${currentUser})}"></div>

<main id="main">
  <div class="page-title"><i class="bi bi-speedometer2 me-2 text-primary"></i>대시보드</div>

  <!-- 요약 카드 -->
  <div class="row g-3 mb-4">
    <div class="col-sm-6 col-xl-3">
      <div class="card h-100">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="rounded-3 p-3" style="background:#e7f1ff;">
            <i class="bi bi-people-fill fs-3 text-primary"></i>
          </div>
          <div>
            <div class="text-muted small">전체 사용자</div>
            <div class="fw-bold fs-3" th:text="${userCount}">0</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-xl-3">
      <div class="card h-100">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="rounded-3 p-3" style="background:#e8f5e9;">
            <i class="bi bi-diagram-3-fill fs-3 text-success"></i>
          </div>
          <div>
            <div class="text-muted small">전체 부서</div>
            <div class="fw-bold fs-3" th:text="${deptCount}">0</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-xl-3">
      <div class="card h-100">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="rounded-3 p-3" style="background:#fff3e0;">
            <i class="bi bi-journal-text fs-3 text-warning"></i>
          </div>
          <div>
            <div class="text-muted small">금일 감사로그</div>
            <div class="fw-bold fs-3" th:text="${recentLogs != null ? recentLogs.size() : 0}">0</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-xl-3">
      <div class="card h-100">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="rounded-3 p-3" style="background:#fce4ec;">
            <i class="bi bi-shield-check fs-3 text-danger"></i>
          </div>
          <div>
            <div class="text-muted small">접속 계정</div>
            <div class="fw-bold fs-5 mt-1" th:text="${currentUser?.name}">-</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 최근 감사로그 -->
  <div class="card">
    <div class="card-header d-flex align-items-center justify-content-between py-3 px-4">
      <span class="fw-semibold"><i class="bi bi-journal-text me-2 text-muted"></i>최근 감사 로그</span>
      <a th:href="@{/admin/audit-logs}" class="btn btn-sm btn-outline-secondary">전체 보기</a>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th class="px-4">시각</th>
              <th>사용자</th>
              <th>액션</th>
              <th>대상</th>
              <th>상세</th>
              <th>IP</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="log : ${recentLogs}">
              <td class="px-4 text-muted small" th:text="${#temporals.format(log.createdAt, 'MM-dd HH:mm')}">-</td>
              <td><span class="badge bg-secondary" th:text="${log.username}">-</span></td>
              <td>
                <span class="badge"
                      th:classappend="${log.action == 'CREATE'} ? 'bg-success' : (${log.action == 'DELETE'} ? 'bg-danger' : 'bg-primary')"
                      th:text="${log.action}">-</span>
              </td>
              <td class="small" th:text="${log.targetType}">-</td>
              <td class="small text-muted" th:text="${log.detail}">-</td>
              <td class="small text-muted" th:text="${log.ipAddress}">-</td>
            </tr>
            <tr th:if="${recentLogs == null or recentLogs.isEmpty()}">
              <td colspan="6" class="text-center text-muted py-4">감사 로그가 없습니다.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
