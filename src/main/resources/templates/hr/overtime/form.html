<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('초과근무 신청')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar(${menus}, '/hr/overtime')}"></div>
<div th:replace="~{fragments/layout :: topbar('초과근무 신청', ${currentUser})}"></div>
<main id="main">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="page-title mb-0"><i class="bi bi-hourglass-split me-2 text-primary"></i>초과근무 신청</div>
    <a th:href="@{/hr/overtime}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>목록</a>
  </div>

  <div class="card" style="max-width:600px;">
    <div class="card-body p-4">

      <div th:if="${autoApprove}" class="alert alert-success d-flex align-items-center gap-2 py-2 mb-3">
        <i class="bi bi-patch-check-fill fs-5"></i>
        <span class="small">팀장 이상 직급 또는 관리자 등록 건은 결재 단계 없이 <strong>자동 승인</strong>됩니다.</span>
      </div>

      <form th:action="@{/hr/overtime}" method="post">
        <div class="row g-3">

          <!-- 직원 선택 (관리자) / 본인 표시 (일반) -->
          <div class="col-12" th:if="${isManager}">
            <label class="form-label fw-semibold">직원 <span class="text-danger">*</span></label>
            <select name="employeeId" class="form-select" required>
              <option value="">-- 직원 선택 --</option>
              <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.name}">직원</option>
            </select>
          </div>
          <div class="col-12" th:unless="${isManager}">
            <label class="form-label fw-semibold">신청자</label>
            <div class="form-control bg-light">
              <span th:each="emp : ${employees}" th:if="${emp.id == myEmployeeId}"
                    th:text="${emp.name} + ' (본인)'">본인</span>
            </div>
          </div>

          <!-- 근무일 -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">근무일 <span class="text-danger">*</span></label>
            <input type="date" name="workDate" id="workDate" class="form-control" required/>
          </div>

          <!-- 유형 -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">초과근무 유형 <span class="text-danger">*</span></label>
            <select name="overtimeType" class="form-select" required>
              <option value="WEEKDAY">평일</option>
              <option value="WEEKEND">주말</option>
              <option value="HOLIDAY">공휴일</option>
            </select>
          </div>

          <!-- 시작 시각 -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">시작 시각 <span class="text-danger">*</span></label>
            <input type="time" name="startTime" id="startTime" class="form-control" required/>
          </div>

          <!-- 종료 시각 -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">종료 시각 <span class="text-danger">*</span></label>
            <input type="time" name="endTime" id="endTime" class="form-control" required/>
          </div>

          <!-- 시간 자동 계산 표시 -->
          <div class="col-12">
            <div class="p-3 rounded bg-light border d-flex align-items-center gap-3">
              <i class="bi bi-clock-history text-primary fs-5"></i>
              <div>
                <div class="small text-muted">초과근무 시간</div>
                <div class="fw-semibold fs-5" id="hoursDisplay">—</div>
              </div>
              <div class="ms-auto small text-muted">시작/종료 시각 선택 시 자동 계산</div>
            </div>
          </div>

          <!-- 사유 -->
          <div class="col-12">
            <label class="form-label fw-semibold">사유 <span class="text-danger">*</span></label>
            <textarea name="reason" class="form-control" rows="3"
                      placeholder="초과근무 사유를 입력하세요." required maxlength="500"></textarea>
          </div>

        </div>
        <hr class="my-4"/>
        <div class="d-flex gap-2 justify-content-end">
          <a th:href="@{/hr/overtime}" class="btn btn-outline-secondary">취소</a>
          <button type="submit" class="btn btn-primary" id="submitBtn" disabled>
            <i class="bi bi-check-lg me-1"></i>신청 완료
          </button>
        </div>
      </form>
    </div>
  </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
  const startInput = document.getElementById('startTime');
  const endInput   = document.getElementById('endTime');
  const display    = document.getElementById('hoursDisplay');
  const submitBtn  = document.getElementById('submitBtn');

  function calcHours() {
    const s = startInput.value;
    const e = endInput.value;
    if (!s || !e) { display.textContent = '—'; submitBtn.disabled = true; return; }

    const [sh, sm] = s.split(':').map(Number);
    const [eh, em] = e.split(':').map(Number);
    const totalMins = (eh * 60 + em) - (sh * 60 + sm);

    if (totalMins <= 0) {
      display.textContent = '종료 시각이 시작 시각보다 빠릅니다';
      display.className = 'fw-semibold fs-5 text-danger';
      submitBtn.disabled = true;
      return;
    }

    const raw = totalMins / 60;
    const rounded = Math.round(raw * 2) / 2;
    display.textContent = rounded + ' 시간 (' + totalMins + '분)';
    display.className = 'fw-semibold fs-5 text-primary';
    submitBtn.disabled = false;
  }

  startInput.addEventListener('change', calcHours);
  endInput.addEventListener('change', calcHours);

  // 근무일 선택 시 평일/주말 자동 선택
  document.getElementById('workDate').addEventListener('change', function () {
    const d = new Date(this.value);
    const day = d.getDay(); // 0=일, 6=토
    const select = document.querySelector('select[name="overtimeType"]');
    if (day === 0 || day === 6) select.value = 'WEEKEND';
    else select.value = 'WEEKDAY';
  });

  document.querySelector('form').addEventListener('submit', function (e) {
    if (submitBtn.disabled) { e.preventDefault(); alert('시작/종료 시각을 올바르게 입력해주세요.'); }
  });
</script>
</body>
</html>
