<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('직원 상세')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar(${menus}, '/hr/employees')}"></div>
<div th:replace="~{fragments/layout :: topbar('직원 상세', ${currentUser})}"></div>
<main id="main">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="page-title mb-0"><i class="bi bi-person-lines-fill me-2 text-primary"></i>직원 상세</div>
    <div class="d-flex gap-2">
      <a th:href="@{/hr/employees/{id}/edit(id=${employee.id})}" class="btn btn-outline-primary">
        <i class="bi bi-pencil me-1"></i>수정
      </a>
      <a th:href="@{/hr/employees}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>목록
      </a>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-lg-5">
      <div class="card">
        <div class="card-header py-3 px-4 fw-semibold">기본 정보</div>
        <div class="card-body px-4">
          <table class="table table-borderless mb-0">
            <tr><th class="text-muted small w-35">사번</th><td class="font-monospace" th:text="${employee.employeeNo}">-</td></tr>
            <tr><th class="text-muted small">이름</th><td class="fw-semibold" th:text="${employee.name}">-</td></tr>
            <tr><th class="text-muted small">생년월일</th><td th:text="${employee.birthDate}">-</td></tr>
            <tr><th class="text-muted small">성별</th><td th:text="${employee.gender}">-</td></tr>
            <tr><th class="text-muted small">주소</th><td th:text="${employee.address}">-</td></tr>
            <tr>
              <th class="text-muted small">부서</th>
              <td><span th:each="d : ${departments}" th:if="${d.id == employee.departmentId}" th:text="${d.name}">-</span></td>
            </tr>
            <tr>
              <th class="text-muted small">직급</th>
              <td><span th:each="p : ${positions}" th:if="${p.id == employee.positionId}" th:text="${p.name}">-</span></td>
            </tr>
            <tr><th class="text-muted small">입사일</th><td th:text="${employee.hireDate}">-</td></tr>
            <tr><th class="text-muted small">퇴사일</th><td th:text="${employee.resignDate != null ? employee.resignDate : '-'}">-</td></tr>
            <tr>
              <th class="text-muted small">상태</th>
              <td>
                <span th:switch="${employee.status}">
                  <span th:case="'ACTIVE'"   class="badge bg-success">재직</span>
                  <span th:case="'RESIGNED'" class="badge bg-secondary">퇴직</span>
                  <span th:case="'LEAVE'"    class="badge bg-warning text-dark">휴직</span>
                </span>
              </td>
            </tr>
          </table>
        </div>
      </div>
    </div>

    <div class="col-lg-7">
      <div class="card">
        <div class="card-header py-3 px-4 fw-semibold d-flex justify-content-between align-items-center">
          <span>빠른 이동</span>
        </div>
        <div class="card-body d-flex flex-wrap gap-3 p-4">
          <a th:href="@{/hr/attendance(employeeId=${employee.id})}" class="btn btn-outline-primary">
            <i class="bi bi-clock me-1"></i>근태 기록
          </a>
          <a th:href="@{/hr/leave(employeeId=${employee.id})}" class="btn btn-outline-success">
            <i class="bi bi-calendar3 me-1"></i>휴가 신청
          </a>
          <a th:href="@{/hr/salary(employeeId=${employee.id})}" class="btn btn-outline-warning">
            <i class="bi bi-cash-stack me-1"></i>급여 내역
          </a>
        </div>
      </div>
    </div>
  </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
