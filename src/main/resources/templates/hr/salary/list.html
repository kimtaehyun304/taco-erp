<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('급여 관리')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar(${menus}, '/hr/salary')}"></div>
<div th:replace="~{fragments/layout :: topbar('급여 관리', ${currentUser})}"></div>
<main id="main">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="page-title mb-0"><i class="bi bi-cash-stack me-2 text-primary"></i>급여 관리</div>
    <a th:href="@{/hr/salary/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>급여 등록</a>
  </div>

  <div class="card mb-3">
    <div class="card-body py-3 px-4">
      <form th:action="@{/hr/salary}" method="get" class="d-flex gap-2">
        <select name="employeeId" class="form-select" style="max-width:200px;">
          <option value="">직원 선택</option>
          <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.name}"
                  th:selected="${emp.id == selectedEmployeeId}">직원</option>
        </select>
        <button type="submit" class="btn btn-primary">조회</button>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th class="px-4">지급월</th>
              <th>기본급</th>
              <th>보너스</th>
              <th>공제액</th>
              <th>실지급액</th>
              <th>지급일</th>
              <th class="text-center">관리</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="sal : ${salaries}">
              <td class="px-4 fw-semibold font-monospace" th:text="${sal.payMonth}">-</td>
              <td class="small" th:text="${#numbers.formatDecimal(sal.baseSalary,0,'COMMA',0,'POINT')} + '원'">-</td>
              <td class="small text-success"
                  th:text="${sal.bonus != null ? #numbers.formatDecimal(sal.bonus,0,'COMMA',0,'POINT') + '원' : '-'}">-</td>
              <td class="small text-danger"
                  th:text="${sal.deduction != null ? #numbers.formatDecimal(sal.deduction,0,'COMMA',0,'POINT') + '원' : '-'}">-</td>
              <td class="fw-bold text-primary"
                  th:text="${sal.netSalary != null ? #numbers.formatDecimal(sal.netSalary,0,'COMMA',0,'POINT') + '원' : '-'}">-</td>
              <td class="small text-muted"
                  th:text="${sal.paidAt != null ? #temporals.format(sal.paidAt,'yyyy-MM-dd') : '-'}">-</td>
              <td class="text-center">
                <a th:href="@{/hr/salary/{id}/edit(id=${sal.id})}" class="btn btn-sm btn-outline-primary me-1">
                  <i class="bi bi-pencil"></i>
                </a>
                <form th:action="@{/hr/salary/{id}/delete(id=${sal.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('삭제하시겠습니까?')">
                  <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                </form>
              </td>
            </tr>
            <tr th:if="${salaries == null or salaries.isEmpty()}">
              <td colspan="7" class="text-center text-muted py-5">
                <i class="bi bi-cash-stack fs-2 d-block mb-2"></i>급여 내역이 없습니다.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
