<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('휴가 신청')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar(${menus}, '/hr/leave')}"></div>
<div th:replace="~{fragments/layout :: topbar('휴가 신청', ${currentUser})}"></div>
<main id="main">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="page-title mb-0"><i class="bi bi-calendar3 me-2 text-primary"></i>휴가 신청</div>
    <a th:href="@{/hr/leave}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>목록</a>
  </div>

  <div class="card" style="max-width:600px;">
    <div class="card-body p-4">
      <div th:if="${autoApprove and isManager}" class="alert alert-success d-flex align-items-center gap-2 py-2 mb-3">
        <i class="bi bi-patch-check-fill fs-5"></i>
        <span class="small">관리자/인사담당자가 등록하는 휴가 신청은 결재 단계 없이 <strong>자동 승인</strong>됩니다.</span>
      </div>
      <div th:if="${autoApprove and !isManager}" class="alert alert-success d-flex align-items-center gap-2 py-2 mb-3">
        <i class="bi bi-patch-check-fill fs-5"></i>
        <span class="small">팀장 이상 직급은 결재 단계 없이 <strong>자동 승인</strong>됩니다.</span>
      </div>
      <form th:action="@{/hr/leave}" method="post">
        <div class="row g-3">
          <div class="col-12" th:if="${isManager}">
            <label class="form-label fw-semibold">직원 <span class="text-danger">*</span></label>
            <select name="employeeId" class="form-select" required>
              <option value="">-- 직원 선택 --</option>
              <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.name}">직원</option>
            </select>
          </div>
          <div class="col-12" th:unless="${isManager}">
            <label class="form-label fw-semibold">신청자</label>
            <div class="form-control bg-light">
              <span th:each="emp : ${employees}" th:if="${emp.id == myEmployeeId}"
                    th:text="${emp.name} + ' (본인)'">본인</span>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">휴가 종류 <span class="text-danger">*</span></label>
            <select name="leaveType" class="form-select" required>
              <option value="ANNUAL">연차</option>
              <option value="SICK">병가</option>
              <option value="SPECIAL">특별휴가</option>
              <option value="UNPAID">무급휴가</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">일수</label>
            <input type="text" id="daysDisplay" class="form-control bg-light" value="0일" readonly tabindex="-1"/>
            <input type="hidden" name="days" id="daysInput" value="0"/>
            <div class="form-text">시작일/종료일 선택 시 자동 계산됩니다.</div>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">시작일 <span class="text-danger">*</span></label>
            <input type="date" name="startDate" id="startDate" class="form-control" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">종료일 <span class="text-danger">*</span></label>
            <input type="date" name="endDate" id="endDate" class="form-control" required/>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">사유</label>
            <textarea name="reason" class="form-control" rows="3" placeholder="휴가 사유를 입력하세요"></textarea>
          </div>
        </div>
        <hr class="my-4"/>
        <div class="d-flex gap-2 justify-content-end">
          <a th:href="@{/hr/leave}" class="btn btn-outline-secondary">취소</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>신청 완료
          </button>
        </div>
      </form>
    </div>
  </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
  const startInput = document.getElementById('startDate');
  const endInput = document.getElementById('endDate');
  const daysDisplay = document.getElementById('daysDisplay');
  const daysInput = document.getElementById('daysInput');

  function calcDays() {
    const start = startInput.value;
    const end = endInput.value;
    if (!start || !end) {
      daysDisplay.value = '0일';
      daysInput.value = '0';
      return;
    }
    const startDate = new Date(start);
    const endDate = new Date(end);
    const diffMs = endDate - startDate;
    const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24)) + 1; // 양 끝 포함

    if (diffDays < 1) {
      daysDisplay.value = '날짜를 확인하세요';
      daysInput.value = '0';
      return;
    }
    daysDisplay.value = diffDays + '일';
    daysInput.value = diffDays;
  }

  startInput.addEventListener('change', () => {
    // 종료일이 시작일보다 빠르면 시작일로 맞춰줌
    if (endInput.value && endInput.value < startInput.value) {
      endInput.value = startInput.value;
    }
    endInput.min = startInput.value;
    calcDays();
  });
  endInput.addEventListener('change', calcDays);

  document.querySelector('form').addEventListener('submit', function (e) {
    if (!startInput.value || !endInput.value || Number(daysInput.value) < 1) {
      e.preventDefault();
      alert('시작일과 종료일을 올바르게 선택해주세요.');
    }
  });
</script>
</body>
</html>
